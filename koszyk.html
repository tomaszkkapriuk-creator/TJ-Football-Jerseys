<section class="hero-search">
    <div class="hero-overlay">

    <a href="stronaglowna.html">
        <img src="LogoTJ.png" alt="Logo" class="floating-logo">
    </a>

    <div class="hero-overlay">

        <h3>Znajdź swoją wymarzoną koszulkę</h3>

        <div class="fake-search" id="fakeSearch">
            <span id="typing-text"></span>
            <span class="cursor">|</span>
        </div>

        <div class="real-search hidden" id="realSearch">
            <input type="text" id="searchInput" placeholder="Szukaj koszulki..." />
        </div>

    <a href="kontakt.html" class="floating-contact">Kontakt</a>

    <a href="koszyk.html">
        <img src="koszyk.png" alt="Koszyk" class="floating-cart">
    </a>

    </div>
</section>

<nav>
<a href="stronaglowna.html">Strona Główna</a>
<a href="laliga.html">La Liga</a>

<div class="container">

  <!-- LEWA STRONA -->
  <div class="left-side">

    <h2>Dane do zamówienia</h2>

    <form id="orderForm">

      <label>Imię i nazwisko:</label><br>
      <input type="text" id="imie" required><br><br>

      <label>Adres:</label><br>
      <input type="text" id="adres" required><br><br>

      <label>Email:</label><br>
      <input type="email" id="email" required><br><br>

      <label>Sposób dostawy:</label><br>
      <select id="dostawa" onchange="showSummary(); togglePickupPoint();">
        <option value="">Wybierz</option>
        <option value="Kurier InPost">Kurier InPost (+ 9zł)</option>
        <option value="Paczkomat InPost">Paczkomat InPost (+ 7zł)</option>
        <option value="Kurier DPD">Kurier DPD (+ 11zł)</option>
        <option value="Punkt ORLEN Paczka">Punkt ORLEN Paczka (+ 8zł)</option>
        <option value="Kurier DHL">Kurier DHL (+ 12zł)</option>
      </select>

      <div id="pickupPointBox" style="display:none;">
        <label><br>Adres punktu / paczkomatu:</label><br>
        <input type="text" id="pickupPoint"><br><br>
      </div>

      <br>

      <label>Metoda płatności:</label><br>
      <select id="platnosc" required>
        <option value="">Wybierz</option>
        <option value="Przelew">Przelew</option>
        <option value="BLIK">BLIK</option>
        <option value="Karta">Karta</option>
        <option value="Płatność przy odbiorze">Płatność przy odbiorze</option>
      </select>

      <br><br>

      <button type="button" onclick="placeOrder()">Złóż zamówienie</button><br>
      <button type="button" onclick="clearCart()">Wyczyść koszyk</button>

    </form>

  </div>

  <!-- PRAWA STRONA -->
  <div class="right-side">

    <h2>Podsumowanie</h2>
    <div id="summary"></div>
    <div id="cart"></div>

  </div>

</div>

<footer>
<p>TJ Football Jerseys</p>
</footer>

</body>
</html>
